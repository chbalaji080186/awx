---
- name: Install and configure NGINX on all servers
  hosts: tag_role_nginx
  become: yes

  vars:
    nginx_package: nginx

  tasks:

    - name: Ensure Python3 is used (fix for AWX / modern systems)
      set_fact:
        ansible_python_interpreter: /usr/bin/python3

    - name: Enable NGINX repo for Amazon Linux 2 (if required)
      command: amazon-linux-extras install nginx1 -y
      args:
        warn: false
      when: ansible_distribution == "Amazon" and ansible_distribution_major_version == "2"

    - name: Install NGINX (cross-platform)
      package:
        name: "{{ nginx_package }}"
        state: present

    - name: Ensure NGINX service is enabled and started
      service:
        name: nginx
        state: started
        enabled: yes

    - name: Open HTTP port in firewalld (RHEL/CentOS)
      firewalld:
        service: http
        permanent: yes
        state: enabled
        immediate: yes
      when: ansible_os_family == "RedHat"

    - name: Open HTTP port in UFW (Ubuntu/Debian)
      ufw:
        rule: allow
        name: "Nginx Full"
      when: ansible_os_family == "Debian"

    - name: Create a custom index.html page
      copy:
        content: |
          <html>
          <head><title>NGINX Setup</title></head>
          <body>
            <h1>NGINX is successfully installed!</h1>
            <p>Server: {{ inventory_hostname }}</p>
          </body>
          </html>
        dest: /usr/share/nginx/html/index.html
        mode: '0644'

    - name: Restart NGINX to apply changes
      service:
        name: nginx
        state: restarted
